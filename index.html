<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeWatch</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="scanlines" aria-hidden="true"></div>
<div class="container">

  <header class="header">
    <div class="wordmark">
      <span class="wordmark-glyph" aria-hidden="true">◉</span>
      <h1>TimeWatch</h1>
    </div>
    <div class="date-nav">
      <button id="date-prev" title="Previous day" aria-label="Previous day">&#8592;</button>
      <span class="date-display" id="date-display"></span>
      <button id="date-next" title="Next day" aria-label="Next day">&#8594;</button>
      <button class="today-btn" id="date-today" title="Go to today">Today</button>
    </div>
  </header>

  <div class="timer-display" id="timer-display">
    <span class="timer-idle">Click a task to start tracking</span>
  </div>

  <div class="task-grid" id="task-grid"></div>

  <section class="tally-section">
    <h2>Time Summary</h2>
    <div id="tally-content"></div>
  </section>

  <div class="action-bar">
    <button class="action-btn primary" id="btn-add-task">+ Add Task</button>
    <button class="action-btn primary" id="btn-add-time">+ Add Time</button>
    <button class="action-btn" id="btn-export-csv">Export CSV</button>
    <button class="action-btn" id="btn-copy-summary">Copy Summary</button>
  </div>
  <div class="action-bar action-bar-secondary">
    <button class="action-btn" id="btn-backup">Backup Data</button>
    <button class="action-btn" id="btn-restore">Restore Data</button>
    <input type="file" id="restore-file-input" accept=".json" style="display:none">
  </div>

  <div class="csv-panel" id="csv-panel">
    <div class="csv-panel-inner">
      <div class="csv-presets">
        <button class="csv-preset-btn" data-preset="today">Today</button>
        <button class="csv-preset-btn" data-preset="week">This Week</button>
        <button class="csv-preset-btn" data-preset="month">This Month</button>
      </div>
      <div class="csv-range">
        <label>From <input type="date" id="csv-start"></label>
        <label>To <input type="date" id="csv-end"></label>
      </div>
      <button class="action-btn primary csv-download-btn" id="btn-csv-download">Download</button>
    </div>
  </div>

</div>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <h3 class="modal-title" id="modal-title"></h3>
    <p class="modal-message" id="modal-message"></p>
    <input type="text" class="modal-input" id="modal-input" maxlength="60" autocomplete="off" spellcheck="false">
    <div class="modal-actions">
      <button class="action-btn" id="modal-cancel">Cancel</button>
      <button class="action-btn primary" id="modal-confirm">OK</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="manual-entry-modal" role="dialog" aria-modal="true" aria-labelledby="manual-entry-title">
  <div class="modal">
    <h2 class="modal-title" id="manual-entry-title">Add Time Entry</h2>
    <div class="modal-field">
      <label for="manual-task">Task</label>
      <select id="manual-task"></select>
    </div>
    <div class="modal-field modal-row">
      <div class="modal-time-group">
        <label for="manual-start">Start</label>
        <input type="time" id="manual-start">
      </div>
      <div class="modal-time-group">
        <label for="manual-end">End</label>
        <input type="time" id="manual-end">
      </div>
    </div>
    <div class="modal-actions">
      <button class="action-btn" id="manual-cancel">Cancel</button>
      <button class="action-btn primary" id="manual-submit">Add Entry</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
