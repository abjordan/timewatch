<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeWatch</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="header">
    <h1>TimeWatch</h1>
    <div class="date-nav">
      <button id="date-prev" title="Previous day">&larr;</button>
      <span class="date-display" id="date-display"></span>
      <button id="date-next" title="Next day">&rarr;</button>
      <button class="today-btn" id="date-today" title="Go to today">Today</button>
    </div>
  </div>

  <div class="timer-display" id="timer-display">
    <span class="timer-idle">Click a task to start tracking</span>
  </div>

  <div class="task-grid" id="task-grid"></div>

  <div class="tally-section">
    <h2>Time Summary</h2>
    <div id="tally-content"></div>
  </div>

  <div class="action-bar">
    <button class="action-btn primary" id="btn-add-task">+ Add Task</button>
    <button class="action-btn" id="btn-export-csv">Export CSV</button>
    <button class="action-btn" id="btn-copy-summary">Copy Summary</button>
  </div>
  <div class="action-bar action-bar-secondary">
    <button class="action-btn" id="btn-backup">Backup Data</button>
    <button class="action-btn" id="btn-restore">Restore Data</button>
    <input type="file" id="restore-file-input" accept=".json" style="display:none">
  </div>

  <div class="csv-panel" id="csv-panel">
    <div class="csv-panel-inner">
      <div class="csv-presets">
        <button class="csv-preset-btn" data-preset="today">Today</button>
        <button class="csv-preset-btn" data-preset="week">This Week</button>
        <button class="csv-preset-btn" data-preset="month">This Month</button>
      </div>
      <div class="csv-range">
        <label>From <input type="date" id="csv-start"></label>
        <label>To <input type="date" id="csv-end"></label>
      </div>
      <button class="action-btn primary csv-download-btn" id="btn-csv-download">Download</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
