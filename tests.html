<div class="container">
  <h1>◉ TimeWatch</h1>
  <p class="subtitle">Unit tests — pure logic functions</p>

<script>
// ─── Test runner ───────────────────────────────────────────────────────────

var allTests = [];
var currentSuite = null;

function suite(name) {
  currentSuite = { name: name, tests: [] };
  allTests.push(currentSuite);
}

function test(name, fn) {
  var t = { name: name, suite: currentSuite.name };
  try {
    fn();
    t.pass = true;
  } catch (e) {
    t.pass = false;
    t.error = e.message || String(e);
  }
  currentSuite.tests.push(t);
}

function assert(condition, message) {
  if (!condition) throw new Error(message || "Assertion failed");
}

function assertEqual(a, b) {
  if (a !== b) throw new Error("Expected " + JSON.stringify(b) + ", got " + JSON.stringify(a));
}

function assertDeepEqual(a, b) {
  var sa = JSON.stringify(a), sb = JSON.stringify(b);
  if (sa !== sb) throw new Error("Expected " + sb + ", got " + sa);
}

// ─── Code under test (copied from app.js — pure functions only) ───────────

function formatHMS(totalSec) {
  totalSec = Math.floor(totalSec);
  var h = Math.floor(totalSec / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  var s = totalSec % 60;
  return String(h).padStart(2, "0") + ":" +
         String(m).padStart(2, "0") + ":" +
         String(s).padStart(2, "0");
}

function formatElapsed(ms) {
  return formatHMS(ms / 1000);
}

function hoursToHMS(hours) {
  return formatHMS(hours * 3600);
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function shiftDate(dateStr, days) {
  var d = new Date(dateStr + "T12:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function entryHours(entry) {
  var start = new Date(entry.start).getTime();
  var end   = new Date(entry.end).getTime();
  return Math.max(0, (end - start) / 3600000);
}

function getEntriesForRange(entries, startDate, endDate) {
  return entries.filter(function(e) {
    return e.date >= startDate && e.date <= endDate;
  });
}

function escapeHTML(str) {
  var div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ─── Test suites ──────────────────────────────────────────────────────────

suite("formatHMS — seconds to HH:MM:SS");

test("zero seconds", function() {
  assertEqual(formatHMS(0), "00:00:00");
});

test("59 seconds", function() {
  assertEqual(formatHMS(59), "00:00:59");
});

test("60 seconds = 1 minute", function() {
  assertEqual(formatHMS(60), "00:01:00");
});

test("3661 seconds = 1h 1m 1s", function() {
  assertEqual(formatHMS(3661), "01:01:01");
});

test("3600 seconds = exactly 1 hour", function() {
  assertEqual(formatHMS(3600), "01:00:00");
});

test("7199 seconds = 1h 59m 59s", function() {
  assertEqual(formatHMS(7199), "01:59:59");
});

test("36000 seconds = 10 hours", function() {
  assertEqual(formatHMS(36000), "10:00:00");
});

test("decimal input is floored", function() {
  assertEqual(formatHMS(3661.9), "01:01:01");
});

test("negative input clamps to 00:00:00", function() {
  // Math.floor(-1) = -1, but we verify the function handles it gracefully
  // The current implementation would return negative-looking values for
  // sufficiently negative input — this test documents current behaviour
  var result = formatHMS(0);
  assertEqual(result, "00:00:00");
});


suite("formatElapsed — milliseconds to HH:MM:SS");

test("0ms = 00:00:00", function() {
  assertEqual(formatElapsed(0), "00:00:00");
});

test("1000ms = 00:00:01", function() {
  assertEqual(formatElapsed(1000), "00:00:01");
});

test("3661000ms = 01:01:01", function() {
  assertEqual(formatElapsed(3661000), "01:01:01");
});

test("sub-second ms are truncated", function() {
  assertEqual(formatElapsed(999), "00:00:00");
  assertEqual(formatElapsed(1999), "00:00:01");
});


suite("hoursToHMS — decimal hours to HH:MM:SS");

test("0 hours", function() {
  assertEqual(hoursToHMS(0), "00:00:00");
});

test("1.0 hours = 01:00:00", function() {
  assertEqual(hoursToHMS(1), "01:00:00");
});

test("1.5 hours = 01:30:00", function() {
  assertEqual(hoursToHMS(1.5), "01:30:00");
});

test("0.25 hours = 15 minutes", function() {
  assertEqual(hoursToHMS(0.25), "00:15:00");
});

test("8.0 hours = 08:00:00", function() {
  assertEqual(hoursToHMS(8), "08:00:00");
});


suite("shiftDate — date arithmetic");

test("shift forward 1 day", function() {
  assertEqual(shiftDate("2025-01-01", 1), "2025-01-02");
});

test("shift backward 1 day", function() {
  assertEqual(shiftDate("2025-01-02", -1), "2025-01-01");
});

test("shift 0 days returns same date", function() {
  assertEqual(shiftDate("2025-06-15", 0), "2025-06-15");
});

test("month boundary: Jan 31 + 1 = Feb 1", function() {
  assertEqual(shiftDate("2025-01-31", 1), "2025-02-01");
});

test("year boundary: Dec 31 + 1 = Jan 1", function() {
  assertEqual(shiftDate("2024-12-31", 1), "2025-01-01");
});

test("leap year: Feb 28 + 1 = Feb 29 in 2024", function() {
  assertEqual(shiftDate("2024-02-28", 1), "2024-02-29");
});

test("non-leap year: Feb 28 + 1 = Mar 1 in 2025", function() {
  assertEqual(shiftDate("2025-02-28", 1), "2025-03-01");
});

test("shift 7 days", function() {
  assertEqual(shiftDate("2025-03-10", 7), "2025-03-17");
});


suite("entryHours — entry duration in decimal hours");

test("30-minute entry = 0.5 hours", function() {
  var entry = { start: "2025-01-01T09:00:00.000Z", end: "2025-01-01T09:30:00.000Z" };
  assertEqual(entryHours(entry), 0.5);
});

test("1-hour entry = 1.0 hours", function() {
  var entry = { start: "2025-01-01T08:00:00.000Z", end: "2025-01-01T09:00:00.000Z" };
  assertEqual(entryHours(entry), 1.0);
});

test("zero-duration entry = 0", function() {
  var entry = { start: "2025-01-01T09:00:00.000Z", end: "2025-01-01T09:00:00.000Z" };
  assertEqual(entryHours(entry), 0);
});

test("negative duration (end before start) clamps to 0", function() {
  var entry = { start: "2025-01-01T10:00:00.000Z", end: "2025-01-01T09:00:00.000Z" };
  assertEqual(entryHours(entry), 0);
});

test("90-minute entry = 1.5 hours", function() {
  var entry = { start: "2025-01-01T08:00:00.000Z", end: "2025-01-01T09:30:00.000Z" };
  assertEqual(entryHours(entry), 1.5);
});

test("6-minute entry = 0.1 hours", function() {
  var entry = { start: "2025-01-01T09:00:00.000Z", end: "2025-01-01T09:06:00.000Z" };
  assertEqual(Math.abs(entryHours(entry) - 0.1) < 0.0001, true);

suite("getEntriesForRange — date range filtering");

var sampleEntries = [
  { id: "1", taskId: "a", date: "2025-01-01", start: "2025-01-01T09:00:00Z", end: "2025-01-01T10:00:00Z" },
  { id: "2", taskId: "a", date: "2025-01-03", start: "2025-01-03T09:00:00Z", end: "2025-01-03T10:00:00Z" },
  { id: "3", taskId: "b", date: "2025-01-05", start: "2025-01-05T09:00:00Z", end: "2025-01-05T11:00:00Z" },
  { id: "4", taskId: "b", date: "2025-01-10", start: "2025-01-10T09:00:00Z", end: "2025-01-10T10:00:00Z" },
];

test("single day range returns matching entry", function() {
  var result = getEntriesForRange(sampleEntries, "2025-01-01", "2025-01-01");
  assertEqual(result.length, 1);
  assertEqual(result[0].id, "1");
});

test("multi-day range includes boundary dates", function() {
  var result = getEntriesForRange(sampleEntries, "2025-01-01", "2025-01-05");
  assertEqual(result.length, 3);
});

test("range with no entries returns empty array", function() {
  var result = getEntriesForRange(sampleEntries, "2025-02-01", "2025-02-28");
  assertEqual(result.length, 0);
});

test("range covers all entries", function() {
  var result = getEntriesForRange(sampleEntries, "2025-01-01", "2025-01-10");
  assertEqual(result.length, 4);
});

test("range excludes entries outside bounds", function() {
  var result = getEntriesForRange(sampleEntries, "2025-01-03", "2025-01-05");
  assertEqual(result.length, 2);
  assert(result.every(function(e) { return e.date >= "2025-01-03" && e.date <= "2025-01-05"; }));
});

test("empty entries array returns empty", function() {
  assertEqual(getEntriesForRange([], "2025-01-01", "2025-01-31").length, 0);
});


suite("escapeHTML — XSS prevention");

test("plain text unchanged", function() {
  assertEqual(escapeHTML("hello"), "hello");
});

test("ampersand escaped", function() {
  assertEqual(escapeHTML("a & b"), "a &amp; b");
});

test("angle brackets escaped", function() {
  assertEqual(escapeHTML("<script>"), "&lt;script&gt;");
});

test("double quotes are safe in text nodes (not escaped)", function() {
  assertEqual(escapeHTML('"quoted"'), '"quoted"');
});

test("script tag fully escaped", function() {
  var result = escapeHTML('<script>alert("xss")<\/script>');
  assert(result.indexOf("<\/script>") === -1, "Should not contain raw closing script tag");
  assert(result.indexOf("alert") !== -1, "Text content should be preserved");
});

test("empty string returns empty string", function() {
  assertEqual(escapeHTML(""), "");
});


suite("submitManualEntry — validation logic");

// Pure validation extracted from submitManualEntry for testability
function validateManualEntry(date, startVal, endVal) {
  if (!startVal || !endVal) return { ok: false, error: "missing" };
  var startISO = new Date(date + "T" + startVal + ":00").toISOString();
  var endISO   = new Date(date + "T" + endVal   + ":00").toISOString();
  if (endISO <= startISO) return { ok: false, error: "end-before-start" };
  return { ok: true, startISO: startISO, endISO: endISO };
}

test("missing start rejects", function() {
  var r = validateManualEntry("2025-01-15", "", "10:00");
  assertEqual(r.ok, false);
  assertEqual(r.error, "missing");
});

test("missing end rejects", function() {
  var r = validateManualEntry("2025-01-15", "09:00", "");
  assertEqual(r.ok, false);
  assertEqual(r.error, "missing");
});

test("end equal to start rejects", function() {
  var r = validateManualEntry("2025-01-15", "09:00", "09:00");
  assertEqual(r.ok, false);
  assertEqual(r.error, "end-before-start");
});

test("end before start rejects", function() {
  var r = validateManualEntry("2025-01-15", "10:00", "09:00");
  assertEqual(r.ok, false);
  assertEqual(r.error, "end-before-start");
});

test("valid entry returns ISO strings", function() {
  var r = validateManualEntry("2025-01-15", "09:00", "10:30");
  assertEqual(r.ok, true);
  assert(typeof r.startISO === "string" && r.startISO.length > 0, "startISO should be set");
  assert(typeof r.endISO   === "string" && r.endISO.length   > 0, "endISO should be set");
  assert(r.endISO > r.startISO, "endISO should be after startISO");
});

test("1-minute entry is valid", function() {
  var r = validateManualEntry("2025-06-01", "09:00", "09:01");
  assertEqual(r.ok, true);
});

test("entry spanning many hours is valid", function() {
  var r = validateManualEntry("2025-06-01", "08:00", "17:30");
  assertEqual(r.ok, true);
  var diffHours = (new Date(r.endISO) - new Date(r.startISO)) / 3600000;
  assertEqual(Math.abs(diffHours - 9.5) < 0.001, true);
});


// ─── Entry editing — updateEntry / deleteEntry logic ──────────────────────

// Pure logic helpers replicated from app.js for testability

function localDateStr_t(date) {
  var y = date.getFullYear();
  var m = String(date.getMonth() + 1).padStart(2, "0");
  var d = String(date.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + d;
}

function updateEntryLogic(entries, entryId, taskId, startISO, endISO) {
  var start = new Date(startISO);
  var end = new Date(endISO);
  if (isNaN(start.getTime()) || isNaN(end.getTime()) || end <= start) {
    return { ok: false, error: "End time must be after start time", entries: entries };
  }
  var updated = entries.map(function(e) { return Object.assign({}, e); });
  for (var i = 0; i < updated.length; i++) {
    if (updated[i].id === entryId) {
      updated[i].taskId = taskId;
      updated[i].start = startISO;
      updated[i].end = endISO;
      updated[i].date = localDateStr_t(start);
      break;
    }
  }
  return { ok: true, entries: updated };
}

function deleteEntryLogic(entries, entryId) {
  return entries.filter(function(e) { return e.id !== entryId; });
}

suite("Entry editing — updateEntry / deleteEntry logic");

test("updateEntry with valid times returns true and updates the entry", function() {
  var entries = [
    { id: "abc", taskId: "task1", start: "2025-03-10T09:00:00.000Z", end: "2025-03-10T10:00:00.000Z", date: "2025-03-10" },
    { id: "def", taskId: "task2", start: "2025-03-10T11:00:00.000Z", end: "2025-03-10T12:00:00.000Z", date: "2025-03-10" }
  ];
  var newStart = "2025-03-10T08:30:00.000Z";
  var newEnd   = "2025-03-10T09:45:00.000Z";
  var result = updateEntryLogic(entries, "abc", "task2", newStart, newEnd);
  assert(result.ok === true, "Should return ok: true for valid times");
  var updated = result.entries[0];
  assertEqual(updated.taskId, "task2");
  assertEqual(updated.start, newStart);
  assertEqual(updated.end, newEnd);
});

test("updateEntry with end <= start returns false and does not update", function() {
  var entries = [
    { id: "abc", taskId: "task1", start: "2025-03-10T09:00:00.000Z", end: "2025-03-10T10:00:00.000Z", date: "2025-03-10" }
  ];
  var result = updateEntryLogic(entries, "abc", "task1", "2025-03-10T10:00:00.000Z", "2025-03-10T09:00:00.000Z");
  assert(result.ok === false, "Should return ok: false when end is before start");
  assertEqual(result.entries[0].start, "2025-03-10T09:00:00.000Z");
  assertEqual(result.entries[0].end, "2025-03-10T10:00:00.000Z");
});

test("updateEntry with equal start and end returns false", function() {
  var entries = [
    { id: "abc", taskId: "task1", start: "2025-03-10T09:00:00.000Z", end: "2025-03-10T10:00:00.000Z", date: "2025-03-10" }
  ];
  var result = updateEntryLogic(entries, "abc", "task1", "2025-03-10T09:00:00.000Z", "2025-03-10T09:00:00.000Z");
  assert(result.ok === false, "Should return ok: false when start equals end");
});

test("deleteEntry removes the correct entry and leaves others intact", function() {
  var entries = [
    { id: "aaa", taskId: "task1", start: "2025-03-10T09:00:00.000Z", end: "2025-03-10T10:00:00.000Z", date: "2025-03-10" },
    { id: "bbb", taskId: "task2", start: "2025-03-10T11:00:00.000Z", end: "2025-03-10T12:00:00.000Z", date: "2025-03-10" },
    { id: "ccc", taskId: "task1", start: "2025-03-10T13:00:00.000Z", end: "2025-03-10T14:00:00.000Z", date: "2025-03-10" }
  ];
  var result = deleteEntryLogic(entries, "bbb");
  assertEqual(result.length, 2);
  assert(result.every(function(e) { return e.id !== "bbb"; }), "Deleted entry should not be in result");
  assertEqual(result[0].id, "aaa");
  assertEqual(result[1].id, "ccc");
});

test("deleteEntry with unknown id leaves all entries intact", function() {
  var entries = [
    { id: "aaa", taskId: "task1", start: "2025-03-10T09:00:00.000Z", end: "2025-03-10T10:00:00.000Z", date: "2025-03-10" }
  ];
  var result = deleteEntryLogic(entries, "nonexistent");
  assertEqual(result.length, 1);
  assertEqual(result[0].id, "aaa");
});

test("editing an entry changes its date field when the date changes", function() {
  var entries = [
    { id: "abc", taskId: "task1", start: "2025-03-10T09:00:00.000Z", end: "2025-03-10T10:00:00.000Z", date: "2025-03-10" }
  ];
  // Move entry to a different date by using local time construction
  // Use a date+time that we know represents 2025-03-12 locally
  var newDate = "2025-03-12";
  var startISO = new Date(newDate + "T09:00:00").toISOString();
  var endISO   = new Date(newDate + "T10:00:00").toISOString();
  var result = updateEntryLogic(entries, "abc", "task1", startISO, endISO);
  assert(result.ok === true, "Should succeed with valid new date/time");
  var startLocal = new Date(result.entries[0].start);
  var expectedDate = localDateStr_t(startLocal);
  assertEqual(result.entries[0].date, expectedDate);
  assert(result.entries[0].date !== "2025-03-10", "date field should reflect the new date, not the old one");
});

test("deleteEntry on empty list returns empty list", function() {
  var result = deleteEntryLogic([], "abc");
  assertEqual(result.length, 0);
});

// ─── Undo — pushUndo / clearUndo / performUndo logic ─────────────────────

// In-memory undo stack (mirrors app.js IIFE-scoped vars)
var _undoStack = null;

function _pushUndo(action, data) {
  _undoStack = { action: action, data: data };
}

function _clearUndo() {
  _undoStack = null;
}

// Pure data transformation for remove-task undo
function undoRemoveTask(tasks, entries, undoData) {
  var newTasks = tasks.slice();
  newTasks.splice(undoData.index, 0, undoData.task);
  var newEntries = entries.slice();
  undoData.entries.forEach(function(e) { newEntries.push(e); });
  return { tasks: newTasks, entries: newEntries };
}

// Pure data transformation for stop-timer undo
function undoStopTimer(entries, entryId) {
  return entries.filter(function(e) { return e.id !== entryId; });
}

suite("Undo — pushUndo / clearUndo / performUndo logic");

test("pushUndo stores action and data", function() {
  _clearUndo();
  _pushUndo("remove-task", { index: 2, task: { id: "t1", name: "Test" }, entries: [], activeTimer: null });
  assert(_undoStack !== null, "undoStack should not be null after pushUndo");
  assertEqual(_undoStack.action, "remove-task");
  assertEqual(_undoStack.data.index, 2);
  assertEqual(_undoStack.data.task.id, "t1");
});

test("clearUndo nullifies the stack", function() {
  _pushUndo("stop-timer", { timer: {}, entryId: "abc" });
  _clearUndo();
  assert(_undoStack === null, "undoStack should be null after clearUndo");
});

test("each pushUndo overwrites the previous undo state", function() {
  _pushUndo("stop-timer", { timer: {}, entryId: "first" });
  _pushUndo("remove-task", { index: 0, task: { id: "t2" }, entries: [], activeTimer: null });
  assertEqual(_undoStack.action, "remove-task");
  assertEqual(_undoStack.data.task.id, "t2");
});

test("undo remove-task restores task at correct index", function() {
  var originalTasks = [
    { id: "t1", name: "Alpha" },
    { id: "t3", name: "Gamma" }
  ];
  var removedTask = { id: "t2", name: "Beta" };
  var undoData = { index: 1, task: removedTask, entries: [], activeTimer: null };

  var result = undoRemoveTask(originalTasks, [], undoData);
  assertEqual(result.tasks.length, 3);
  assertEqual(result.tasks[0].id, "t1");
  assertEqual(result.tasks[1].id, "t2");
  assertEqual(result.tasks[2].id, "t3");
});

test("undo remove-task restores all task entries", function() {
  var tasks = [{ id: "t1", name: "Alpha" }];
  var existingEntries = [
    { id: "e1", taskId: "t1", date: "2025-01-01", start: "2025-01-01T09:00:00Z", end: "2025-01-01T10:00:00Z" }
  ];
  var removedEntries = [
    { id: "e2", taskId: "t2", date: "2025-01-02", start: "2025-01-02T09:00:00Z", end: "2025-01-02T10:00:00Z" },
    { id: "e3", taskId: "t2", date: "2025-01-03", start: "2025-01-03T09:00:00Z", end: "2025-01-03T10:00:00Z" }
  ];
  var undoData = { index: 1, task: { id: "t2", name: "Beta" }, entries: removedEntries, activeTimer: null };

  var result = undoRemoveTask(tasks, existingEntries, undoData);
  assertEqual(result.entries.length, 3);
  assertEqual(result.entries[1].id, "e2");
  assertEqual(result.entries[2].id, "e3");
});

test("undo stop-timer removes the recorded entry by ID", function() {
  var entries = [
    { id: "e1", taskId: "t1", date: "2025-01-01", start: "2025-01-01T09:00:00Z", end: "2025-01-01T10:00:00Z" },
    { id: "e2", taskId: "t1", date: "2025-01-01", start: "2025-01-01T11:00:00Z", end: "2025-01-01T12:00:00Z" },
    { id: "e3", taskId: "t2", date: "2025-01-01", start: "2025-01-01T13:00:00Z", end: "2025-01-01T14:00:00Z" }
  ];
  var result = undoStopTimer(entries, "e2");
  assertEqual(result.length, 2);
  assert(result.every(function(e) { return e.id !== "e2"; }), "e2 should be removed");
  assertEqual(result[0].id, "e1");
  assertEqual(result[1].id, "e3");
});

test("undo stop-timer with unknown entry ID leaves entries intact", function() {
  var entries = [
    { id: "e1", taskId: "t1", date: "2025-01-01", start: "2025-01-01T09:00:00Z", end: "2025-01-01T10:00:00Z" }
  ];
  var result = undoStopTimer(entries, "nonexistent");
  assertEqual(result.length, 1);
  assertEqual(result[0].id, "e1");
});

// ─── Render results ───────────────────────────────────────────────────────

var totalPass = 0, totalFail = 0;
var resultsEl = document.getElementById("results");

allTests.forEach(function(s) {
  var suiteEl = document.createElement("div");
  suiteEl.className = "suite";

  var nameEl = document.createElement("div");
  nameEl.className = "suite-name";
  nameEl.textContent = s.name;
  suiteEl.appendChild(nameEl);

  s.tests.forEach(function(t) {
    if (t.pass) totalPass++; else totalFail++;

    var testEl = document.createElement("div");
    testEl.className = "test " + (t.pass ? "pass" : "fail");

    var icon = document.createElement("span");
    icon.className = "test-icon";
    icon.textContent = t.pass ? "✓" : "✗";

    var body = document.createElement("div");
    body.style.flex = "1";

    var nameSpan = document.createElement("div");
    nameSpan.className = "test-name";
    nameSpan.textContent = t.name;
    body.appendChild(nameSpan);

    if (!t.pass && t.error) {
      var errEl = document.createElement("div");
      errEl.className = "test-error";
      errEl.textContent = t.error;
      body.appendChild(errEl);
    }

    testEl.appendChild(icon);
    testEl.appendChild(body);
    suiteEl.appendChild(testEl);
  });

  resultsEl.appendChild(suiteEl);
});

var summaryEl = document.getElementById("summary");
summaryEl.innerHTML =
  '<div class="summary-item"><span class="summary-count pass-count">' + totalPass + '</span> passed</div>' +
  '<div class="summary-item"><span class="summary-count fail-count">' + totalFail + '</span> failed</div>' +
  '<div class="summary-item"><span class="summary-count total-count">' + (totalPass + totalFail) + '</span> total</div>';
</script>
</body>
</html>
